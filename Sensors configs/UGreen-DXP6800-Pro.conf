## Manufacturer: UGREEN
## Product Name: DXP6800 Pro
#########################################
chip "it8613-*"

    ignore temp3
    ignore intrusion0
    ignore pwm2
    ignore pwm3
    ignore pwm4
    ignore pwm5

    label fan2 "CPU Fan"
    label fan3 "Case Fan 1"
    label fan4 "Case Fan 2"
    label temp1 "CPU Temp (PECI)"
    label temp2 "Case Temp"
    label in0 "CPU Voltage"
    label in1 "Memory Voltage"

    set fan2_min 300
    set fan3_min 300
    set fan4_min 300

    set temp1_min 5
    set temp1_max 100
    set temp2_min 5
    set temp2_max 100

    set in1_min 1.00
    set in1_max 1.50

    set in2_min 1.80
    set in2_max 2.20

    set in4_min 1.80
    set in4_max 2.20

    set in5_min 1.80
    set in5_max 2.20

    set in7_min 3.00
    set in7_max 3.50
